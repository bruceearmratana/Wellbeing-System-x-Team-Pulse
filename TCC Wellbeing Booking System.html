  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3e1a18\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   TCC Technology — Color tokens\n   Brand: deep corporate navy + steel gray, digital cyan accent.\n   ============================================================ */\n:root {\n  /* ---- Brand core ---- */\n  --tcc-navy-900: #0c1233;   /* deepest — backdrops */\n  --tcc-navy-800: #111a4a;\n  --tcc-navy-700: #16215c;   /* PRIMARY navy (logo \"TECHNOLOGY\") */\n  --tcc-navy-600: #1d2c75;\n  --tcc-navy-500: #2a3d96;   /* lifted navy for hover */\n  --tcc-navy-300: #6f7bc0;\n  --tcc-navy-100: #d9deef;\n  --tcc-navy-050: #eef1f9;\n\n  /* ---- Steel gray (logo \"TCC\") ---- */\n  --tcc-steel-700: #4a4c4f;\n  --tcc-steel-600: #5f6164;\n  --tcc-steel-500: #808285;   /* PRIMARY steel gray */\n  --tcc-steel-400: #9a9c9f;\n  --tcc-steel-300: #c3c5c8;\n  --tcc-steel-200: #dfe1e3;\n  --tcc-steel-100: #eef0f1;\n\n  /* ---- Digital cyan accent (data / connectivity) ---- */\n  --tcc-cyan-600: #008bb0;\n  --tcc-cyan-500: #00a8c8;   /* PRIMARY accent */\n  --tcc-cyan-400: #2bc1dd;\n  --tcc-cyan-300: #7adcef;\n  --tcc-cyan-100: #d3f2f8;\n\n  /* ---- Neutrals ---- */\n  --tcc-white: #ffffff;\n  --tcc-paper: #f6f8fb;       /* app/page background */\n  --tcc-ink-900: #14161c;     /* primary text on light */\n  --tcc-ink-700: #3a3d45;\n  --tcc-ink-500: #6b6f78;\n  --tcc-line: #e3e6ec;        /* hairline borders */\n\n  /* ---- Semantic status ---- */\n  --tcc-success: #2e9e6b;\n  --tcc-warning: #e0973a;\n  --tcc-danger:  #d2444a;\n  --tcc-info:    var(--tcc-cyan-500);\n\n  /* ============================================================\n     Semantic aliases — reference these in components\n     ============================================================ */\n  --color-bg: var(--tcc-paper);\n  --color-bg-inverse: var(--tcc-navy-900);\n  --surface-card: var(--tcc-white);\n  --surface-sunken: var(--tcc-steel-100);\n  --surface-inverse: var(--tcc-navy-800);\n\n  --text-primary: var(--tcc-ink-900);\n  --text-secondary: var(--tcc-ink-500);\n  --text-on-brand: var(--tcc-white);\n  --text-brand: var(--tcc-navy-700);\n  --text-accent: var(--tcc-cyan-600);\n\n  --border-subtle: var(--tcc-line);\n  --border-strong: var(--tcc-steel-300);\n\n  --brand-primary: var(--tcc-navy-700);\n  --brand-primary-hover: var(--tcc-navy-600);\n  --brand-primary-active: var(--tcc-navy-800);\n  --brand-accent: var(--tcc-cyan-500);\n  --brand-accent-hover: var(--tcc-cyan-600);\n\n  --focus-ring: var(--tcc-cyan-400);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TCC Technology — Typography tokens\n   Display: Jost (geometric, echoes the wide thin logo letterforms)\n   Text/UI: IBM Plex Sans (enterprise, neutral, technical)\n   Mono: IBM Plex Mono (specs, metrics, code)\n   ============================================================ */\n:root {\n  --font-display: 'Jost', 'Century Gothic', system-ui, sans-serif;\n  --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;\n  --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;\n\n  /* Weights */\n  --fw-light: 300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n\n  /* Type scale (1.250 major-third-ish, tuned) */\n  --fs-display-xl: 64px;\n  --fs-display-lg: 48px;\n  --fs-display-md: 36px;\n  --fs-heading-lg: 28px;\n  --fs-heading-md: 22px;\n  --fs-heading-sm: 18px;\n  --fs-body-lg: 18px;\n  --fs-body: 16px;\n  --fs-body-sm: 14px;\n  --fs-caption: 12px;\n  --fs-overline: 11px;\n\n  /* Line heights */\n  --lh-tight: 1.1; /* @kind font */\n  --lh-snug: 1.25; /* @kind font */\n  --lh-normal: 1.5; /* @kind font */\n  --lh-relaxed: 1.65; /* @kind font */\n\n  /* Letter spacing — Jost display & overlines run wide, echoing logo */\n  --ls-display: 0.01em; /* @kind font */\n  --ls-overline: 0.18em; /* @kind font */\n  --ls-wide: 0.06em; /* @kind font */\n  --ls-normal: 0; /* @kind font */\n\n  /* Semantic text roles */\n  --text-display: var(--fw-light) var(--fs-display-lg)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-heading: var(--fw-semibold) var(--fs-heading-lg)/var(--lh-snug) var(--font-display); /* @kind font */\n  --text-body-role: var(--fw-regular) var(--fs-body)/var(--lh-normal) var(--font-sans); /* @kind font */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TCC Technology — Spacing, radius, shadow, motion tokens\n   Base unit: 4px. Calm, gridded, enterprise.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* Radii — restrained, corporate (not pill-soft) */\n  --radius-xs: 3px;\n  --radius-sm: 6px;\n  --radius-md: 10px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border-width: 1px;\n  --border-width-strong: 2px;\n\n  /* Elevation — soft, cool-tinted navy shadows */\n  --shadow-xs: 0 1px 2px rgba(12, 18, 51, 0.06);\n  --shadow-sm: 0 2px 6px rgba(12, 18, 51, 0.08);\n  --shadow-md: 0 8px 24px rgba(12, 18, 51, 0.10);\n  --shadow-lg: 0 18px 48px rgba(12, 18, 51, 0.14);\n  --shadow-glow: 0 0 0 4px rgba(0, 168, 200, 0.18);\n\n  /* Motion — confident, no bounce */\n  --ease-standard: cubic-bezier(0.4, 0.0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1); /* @kind other */\n  --ease-in: cubic-bezier(0.4, 0.0, 1, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n el gray, digital cyan accent.\n   ============================================================ */\n:root {\n  /* ---- Brand core ---- */\n  --tcc-navy-900: #0c1233;   /* deepest — backdrops */\n  --tcc-navy-800: #111a4a;\n  --tcc-navy-700: #16215c;   /* PRIMARY navy (logo \"TECHNOLOGY\") */\n  --tcc-navy-600: #1d2c75;\n  --tcc-navy-500: #2a3d96;   /* lifted navy for hover */\n  --tcc-navy-300: #6f7bc0;\n  --tcc-navy-100: #d9deef;\n  --tcc-navy-050: #eef1f9;\n\n  /* ---- Steel gray (logo \"TCC\") ---- */\n  --tcc-steel-700: #4a4c4f;\n  --tcc-steel-600: #5f6164;\n  --tcc-steel-500: #808285;   /* PRIMARY steel gray */\n  --tcc-steel-400: #9a9c9f;\n  --tcc-steel-300: #c3c5c8;\n  --tcc-steel-200: #dfe1e3;\n  --tcc-steel-100: #eef0f1;\n\n  /* ---- Digital cyan accent (data / connectivity) ---- */\n  --tcc-cyan-600: #008bb0;\n  --tcc-cyan-500: #00a8c8;   /* PRIMARY accent */\n  --tcc-cyan-400: #2bc1dd;\n  --tcc-cyan-300: #7adcef;\n  --tcc-cyan-100: #d3f2f8;\n\n  /* ---- Neutrals ---- */\n  --tcc-white: #ffffff;\n  --tcc-paper: #f6f8fb;       /* app/page background */\n  --tcc-ink-900: #14161c;     /* primary text on light */\n  --tcc-ink-700: #3a3d45;\n  --tcc-ink-500: #6b6f78;\n  --tcc-line: #e3e6ec;        /* hairline borders */\n\n  /* ---- Semantic status ---- */\n  --tcc-success: #2e9e6b;\n  --tcc-warning: #e0973a;\n  --tcc-danger:  #d2444a;\n  --tcc-info:    var(--tcc-cyan-500);\n\n  /* ============================================================\n     Semantic aliases — reference these in components\n     ============================================================ */\n  --color-bg: var(--tcc-paper);\n  --color-bg-inverse: var(--tcc-navy-900);\n  --surface-card: var(--tcc-white);\n  --surface-sunken: var(--tcc-steel-100);\n  --surface-inverse: var(--tcc-navy-800);\n\n  --text-primary: var(--tcc-ink-900);\n  --text-secondary: var(--tcc-ink-500);\n  --text-on-brand: var(--tcc-white);\n  --text-brand: var(--tcc-navy-700);\n  --text-accent: var(--tcc-cyan-600);\n\n  --border-subtle: var(--tcc-line);\n  --border-strong: var(--tcc-steel-300);\n\n  --brand-primary: var(--tcc-navy-700);\n  --brand-primary-hover: var(--tcc-navy-600);\n  --brand-primary-active: var(--tcc-navy-800);\n  --brand-accent: var(--tcc-cyan-500);\n  --brand-accent-hover: var(--tcc-cyan-600);\n\n  --focus-ring: var(--tcc-cyan-400);\n}\n\n/* ============================================================\n   TCC Technology — Typography tokens\n   Display: Jost (geometric, echoes the wide thin logo letterforms)\n   Text/UI: IBM Plex Sans (enterprise, neutral, technical)\n   Mono: IBM Plex Mono (specs, metrics, code)\n   ============================================================ */\n:root {\n  --font-display: 'Jost', 'Century Gothic', system-ui, sans-serif;\n  --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;\n  --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;\n\n  /* Weights */\n  --fw-light: 300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n\n  /* Type scale (1.250 major-third-ish, tuned) */\n  --fs-display-xl: 64px;\n  --fs-display-lg: 48px;\n  --fs-display-md: 36px;\n  --fs-heading-lg: 28px;\n  --fs-heading-md: 22px;\n  --fs-heading-sm: 18px;\n  --fs-body-lg: 18px;\n  --fs-body: 16px;\n  --fs-body-sm: 14px;\n  --fs-caption: 12px;\n  --fs-overline: 11px;\n\n  /* Line heights */\n  --lh-tight: 1.1; /* @kind font */\n  --lh-snug: 1.25; /* @kind font */\n  --lh-normal: 1.5; /* @kind font */\n  --lh-relaxed: 1.65; /* @kind font */\n\n  /* Letter spacing — Jost display & overlines run wide, echoing logo */\n  --ls-display: 0.01em; /* @kind font */\n  --ls-overline: 0.18em; /* @kind font */\n  --ls-wide: 0.06em; /* @kind font */\n  --ls-normal: 0; /* @kind font */\n\n  /* Semantic text roles */\n  --text-display: var(--fw-light) var(--fs-display-lg)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-heading: var(--fw-semibold) var(--fs-heading-lg)/var(--lh-snug) var(--font-display); /* @kind font */\n  --text-body-role: var(--fw-regular) var(--fs-body)/var(--lh-normal) var(--font-sans); /* @kind font */\n}\n\n/* ============================================================\n   TCC Technology — Spacing, radius, shadow, motion tokens\n   Base unit: 4px. Calm, gridded, enterprise.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* Radii — restrained, corporate (not pill-soft) */\n  --radius-xs: 3px;\n  --radius-sm: 6px;\n  --radius-md: 10px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border-width: 1px;\n  --border-width-strong: 2px;\n\n  /* Elevation — soft, cool-tinted navy shadows */\n  --shadow-xs: 0 1px 2px rgba(12, 18, 51, 0.06);\n  --shadow-sm: 0 2px 6px rgba(12, 18, 51, 0.08);\n  --shadow-md: 0 8px 24px rgba(12, 18, 51, 0.10);\n  --shadow-lg: 0 18px 48px rgba(12, 18, 51, 0.14);\n  --shadow-glow: 0 0 0 4px rgba(0, 168, 200, 0.18);\n\n  /* Motion — confident, no bounce */\n  --ease-standard: cubic-bezier(0.4, 0.0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1); /* @kind other */\n  --ease-in: cubic-bezier(0.4, 0.0, 1, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur-base: 240ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n\n  /* Layout */\n  --container-max: 1200px;\n  --content-max: 720px;\n}\n\n/* ============================================================\n   TCC Technology — base element styles & helpers\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font: var(--text-body-role);\n  color: var(--text-primary);\n  background: var(--color-bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-brand);\n  margin: 0 0 var(--space-3);\n  line-height: var(--lh-snug);\n  font-weight: var(--fw-semibold);\n}\nh1 { font-size: var(--fs-display-md); font-weight: var(--fw-light); letter-spacing: var(--ls-display); }\nh2 { font-size: var(--fs-heading-lg); }\nh3 { font-size: var(--fs-heading-md); }\n\np { margin: 0 0 var(--space-4); }\na { color: var(--text-accent); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n/* Overline / eyebrow — recurring brand motif (wide-tracked caps) */\n.tcc-overline {\n  font-family: var(--font-sans);\n  font-size: var(--fs-overline);\n  font-weight: var(--fw-semibold);\n  letter-spacing: var(--ls-overline);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n\n/* Thin brand rule echoing the logo's divider ellipse */\n.tcc-rule {\n  height: 2px;\n  border: 0;\n  background: linear-gradient(90deg, var(--tcc-cyan-500), transparent);\n  width: 64px;\n}\n\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box;}\n    body{margin:0;}\n    [data-theme=\"dark\"], :root:has([data-theme=\"dark\"]){\n      --color-bg:#0a0f2b;\n      --surface-card:#111a4a;\n      --surface-sunken:#0c1233;\n      --surface-inverse:#0c1233;\n      --text-primary:#eef1f9;\n      --text-secondary:#9aa3c8;\n      --text-brand:#ffffff;\n      --text-accent:#2bc1dd;\n      --border-subtle:rgba(255,255,255,0.10);\n      --border-strong:rgba(255,255,255,0.20);\n      --brand-primary:#2a3d96;\n      --brand-primary-hover:#1d2c75;\n      --wb-wash-a:rgba(0,168,200,.10);\n      --wb-wash-b:rgba(42,61,150,.14);\n      --wb-blob:rgba(0,168,200,.08);\n      --wb-blob2:rgba(111,123,192,.09);\n      --wb-mote:rgba(120,220,240,.5);\n    }\n    /* Light theme (default): white surfaces with a subtle light-blue was :1fr 1fr;gap:14px;\">\n            <div style=\"background:var(--surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:16px;\">\n              <div style=\"font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);margin-bottom:6px;\">TEAM PULSE<\u002Fdiv>\n              <div style=\"font-weight:600;color:var(--text-primary);font-size:18px;margin-bottom:6px;\">The <span style=\"color:var(--text-accent);\">What<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--text-secondary);line-height:1.5;\">Quantitative. Commits, PRs, velocity, task progression — what is moving.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:16px;\">\n              <div style=\"font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);margin-bottom:6px;\">WELLBEING<\u002Fdiv>\n              <div style=\"font-weight:600;color:var(--text-primary);font-size:18px;margin-bottom:6px;\">The <span style=\"color:var(--text-accent);\">Why<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13px;color:var(--text-secondary);line-height:1.5;\">Qualitative. How people feel, how they cope, why they behave the way they do.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:18px 0 0;font-size:14px;color:var(--text-secondary);line-height:1.55;\"><strong style=\"color:var(--text-primary);\">Together:<\u002Fstrong> Team Pulse explains behaviour, Wellbeing explains motivation — covering overall company wellbeing.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isSlide3 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"animation:wbFade var(--dur-slow) var(--ease-out);\">\n          <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent);font-weight:600;margin-bottom:8px;\">Scoring<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:300;font-size:28px;margin:0 0 18px;color:var(--text-primary);\">Support tiers, never diagnosis<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <div style=\"display:flex;align-items:center;gap:14px;background:var(--surface-sunken);border-radius:var(--radius-sm);padding:11px 14px;\"><span style=\"font-family:var(--font-mono);font-weight:600;color:#2e9e6b;width:64px;\">4.0–5.0<\u002Fspan><span style=\"font-weight:600;color:var(--text-primary);width:78px;\">Pass<\u002Fspan><span style=\"font-size:13px;color:var(--text-secondary);\">Well-adjusted, progressing<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px;background:var(--surface-sunken);border-radius:var(--radius-sm);padding:11px 14px;\"><span style=\"font-family:var(--font-mono);font-weight:600;color:#c98a2e;width:64px;\">3.0–3.9<\u002Fspan><span style=\"font-weight:600;color:var(--text-primary);width:78px;\">Watch<\u002Fspan><span style=\"font-size:13px;color:var(--text-secondary);\">Acceptable, monitor<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px;background:var(--surface-sunken);border-radius:var(--radius-sm);padding:11px 14px;\"><span style=\"font-family:var(--font-mono);font-weight:600;color:#d98a4a;width:64px;\">2.0–2.9<\u002Fspan><span style=\"font-weight:600;color:var(--text-primary);width:78px;\">Support<\u002Fspan><span style=\"font-size:13px;color:var(--text-secondary);\">At risk — 1-on-1 plan<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px;background:var(--surface-sunken);border-radius:var(--radius-sm);padding:11px 14px;\"><span style=\"font-family:var(--font-mono);font-weight:600;color:#d2444a;width:64px;\">1.0–1.9<\u002Fspan><span style=\"font-weight:600;color:var(--text-primary);width:78px;\">Flag<\u002Fspan><span style=\"font-size:13px;color:var(--text-secondary);\">Immediate follow-up<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:16px 0 0;font-size:13px;color:var(--text-secondary);font-style:italic;\">For workplace wellbeing support &amp; early intervention — not clinical assessment.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isSlide4 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"animation:wbFade var(--dur-slow) var(--ease-out);\">\n          <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent);font-weight:600;margin-bottom:8px;\">From Check-Up #1<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:300;font-size:28px;margin:0 0 18px;color:var(--text-primary);\">What we heard so far<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div>\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#2e9e6b;margin-bottom:10px;\">Strengths<\u002Fdiv>\n              <ul style=\"margin:0;padding-left:18px;color:var(--text-secondary);font-size:14px;line-height:1.7;\"><li>Strong support network<\u002Fli><li>Good social integration<\u002Fli><li>Positive office environment<\u002Fli><\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#c98a2e;margin-bottom:10px;\">Opportunities<\u002Fdiv>\n              <ul style=\"margin:0;padding-left:18px;color:var(--text-secondary);font-size:14px;line-height:1.7;\"><li>Work allocation visibility<\u002Fli><li>Communication consistency<\u002Fli><li>Project context sharing<\u002Fli><\u002Ful>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:18px 0 0;font-size:14px;color:var(--text-secondary);line-height:1.55;\">These anonymised patterns feed TCCtech's People &amp; Culture strategy — ar(--text-accent);flex:none;\">{{ lockIcon }}<\u002Fspan>\n      <span style=\"font-size:14px;color:var(--text-secondary);\">No name, email or login is collected. Your request is identified only by an anonymous ticket code.<\u002Fspan>\n    <\u002Fdiv>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 6px;color:var(--text-primary);\">Which areas feel heavy right now?<\u002Fh2>\n      <p style=\"font-size:14px;color:var(--text-secondary);margin:0 0 16px;\">Select any that apply.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n        <sc-for list=\"{{ dimItems }}\" as=\"d\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\" style-hover=\"transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,200,.13);\" style-active=\"transform:translateY(0);box-shadow:none;\">\n            <span style=\"font-weight:600;display:block;margin-bottom:2px;\">{{ d.label }}<\u002Fspan>\n            <span style=\"font-size:12.5px;opacity:.8;font-weight:400;\">{{ d.desc }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 16px;color:var(--text-primary);\">How are you feeling overall?<\u002Fh2>\n      <div style=\"display:flex;gap:10px;\">\n        <sc-for list=\"{{ moodItems }}\" as=\"m\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ m.onClick }}\" style=\"{{ m.style }}\" style-hover=\"transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,200,.13);\" style-active=\"transform:translateY(0);box-shadow:none;\">\n            <span style=\"font-family:var(--font-mono);font-size:20px;font-weight:600;\">{{ m.v }}<\u002Fspan>\n            <span style=\"font-size:12px;font-weight:500;\">{{ m.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 16px;color:var(--text-primary);\">How soon would you like to talk?<\u002Fh2>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <sc-for list=\"{{ urgencyItems }}\" as=\"u\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ u.onClick }}\" style=\"{{ u.style }}\" style-hover=\"transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,200,.13);\" style-active=\"transform:translateY(0);box-shadow:none;\">{{ u.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 16px;color:var(--text-primary);\">Preferred format<\u002Fh2>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <sc-for list=\"{{ formatItems }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\" style-hover=\"transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,200,.13);\" style-active=\"transform:translateY(0);box-shadow:none;\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 6px;color:var(--text-primary);\">When are you usually free?<\u002Fh2>\n      <p style=\"font-size:14px;color:var(--text-secondary);margin:0 0 16px;\">Optional — helps the officer find a time.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <sc-for list=\"{{ timeItems }}\" as=\"t\" hint-placeholder-count=\"7\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\" style-hover=\"transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,168,200,.13);\" style-active=\"transform:translateY(0);box-shadow:none;\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:36px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 6px;color:var(--text-primary);\">Preferred date<\u002Fh2>\n      <p style=\"font-size:14px;color:var(--text-secondary);margin:0 0 16px;\">Optional — pick a specific date that works for you.<\u002Fp>\n      <button onclick=\"{{ openBookCal }}\" style=\"{{ bookDateBtnStyle }}\" style-hover=\"border-color:var(--brand-accent);background:rgba(0,168,200,.08);\" style-active=\"transform:translateY(1px);\">{{ bookDateDisplay }}<\u002Fbutton>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:32px;\">\n      <h2 style=\"font-family:var(--font-sans);font-weight:600;font-size:18px;margin:0 0 6px;color:var(--text-primary);\">Anything you'd like to add?<\u002Fh2>\n      <p style=\"font-size:14px;color:var(--text-secondary);margin:0 0 16px;\">Optional and anonymous. Share as much or as little as you like.<\u002Fp>\n      <textarea class=\"wb-input\" rows=\"4\" placeholder=\"In your own words…\" value=\"{{ note }}\" oninput=\"{{ onNote }}\" style=\"resize:vertical;line-height:1.5;\"><\u002Ftextarea>\n    <\u002Fsection>\n\n    <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n      <button onclick=\"{{ submitBooking }}\" disabled=\"{{ submitDisabled }}\" style=\"{{ submitStyle }}\" style-hover=\"filter:brightness(1.07);transform:translateY(-1px);\" style-active=\"transform:translateY(0);\">Submit anonymous request<\u002Fbutton>\n      <span style=\"font-size:13px;color:var(--text-secondary);\">{{ submitHint }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== CONFIRM ===== -->\n  <sc-if value=\"{{ isConfirm }}\" hint-placeholder-val=\"{{ true }}\">\n  <main style=\"position:relative;z-index:2;max-width:620px;margin:0 auto;padding:72px 32px;text-align:center;animation:wbFade var(--dur-slow) var(--ease-out);\">\n    <div style=\"width:72px;height:72px;border-radius:50%;background:var(--tcc-cyan-100);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;color:var(--tcc-cyan-600);\">\n      <span style=\"display:inline-flex;width:34px;height:34px;\">{{ checkIcon }}<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:var(--font-display);font-weight:300;font-size:38px;margin:0 0 12px;color:var(--text-primary);\">Request received<\u002Fh1>\n    <p style=\"font-size:var(--fs-body-lg);color:var(--text-secondary);margin:0 0 28px;line-height:1.6;\">Your anonymous request is now in the HR queue. Keep this code if you'd like to reference it later.<\u002Fp>\n    <div style=\"display:inline-block;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:24px 40px;box-shadow:var(--shadow-md);margin-bottom:36px;\">\n      <div style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;\">Your ticket<\u002Fdiv>\n      <div style=\"font-family:var(--font-mono);font-size:34px;font-weight:600;letter-spacing:.06em;color:var(--text-accent);\">{{ ticketId }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:left;background:var(--surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:24px;margin-bottom:32px;\">\n      <div style=\"font-weight:600;color:var(--text-primary);margin-bottom:14px;\">What happens next<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;font-size:14px;color:var(--text-secondary);line-height:1.5;\">\n        <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--text-accent);font-weight:600;font-family:var(--font-mono);\">01<\u002Fspan> HR reviews the queue and assigns an independent Wellbeing Officer.<\u002Fdiv>\n        <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--text-accent);font-weight:600;font-family:var(--font-mono);\">02<\u002Fspan> A confidential time is proposed that fits your availability.<\u002Fdiv>\n        <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--text-accent);font-weight:600;font-family:var(--font-mono);\">03<\u002Fspan> You meet for a private 15–20 minute conversation — never a work evaluation.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;\">\n      <button onclick=\"{{ goHome }}\" style=\"font-family:var(--font-sans);font-weight:600;font-size:var(--fs-body);color:#062a33;background:var(--brand-accent);border:none;border-radius:var(--radius-md);padding:13px 26px;cursor:pointer;transition:all var(--dur-fast) var(--ease-standard);\" style-hover=\"filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,168,200,.30);\" style-active=\"transform:translateY(0);\">Back to overview<\u002Fbutton>\n      <button onclick=\"{{ goBook }}\" style=\"font-family:var(--font-sans);font-weight:600;font-size:var(--fs-body);color:var(--text-brand);background:transparent;border:1px solid var(--border-strong);border-radius:var(--radius-md);padding:13px 26px;cursor:pointer;transition:all var(--dur-fast) var(--ease-standard);\" style-hover=\"background:var(--surface-sunken);\" style-active=\"transform:translateY(1px);\">Submit another<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== ADMIN LOGIN ===== -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <main style=\"position:relative;z-index:2;max-width:420px;margin:0 auto;padding:72px 32px;animation:wbFade var(--dur-slow) var(--ease-out);\">\n    <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:36px;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent);font-weight:600;margin-bottom:10px;\">HR / People &amp; Culture<\u002Fdiv>\n      <h1 style=\"font-family:var(--font-display);font-weight:300;font-size:30px;margin:0 0 24px;color:var(--text-primary);\">Admin sign in<\u002Fh1>\n      <label style=\"display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px;\">Username<\u002Flabel>\n      <input class=\"wb-input\" type=\"text\" value=\"{{ loginUser }}\" oninput=\"{{ onUser }}\" placeholder=\"hr\" style=\"margin-bottom:16px;\">\n      <label style=\"display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px;\">Password<\u002Flabel>\n      <input class=\"wb-input\" type=\"password\" value=\"{{ loginPass }}\" oninput=\"{{ onPass }}\" placeholder=\"••••••••\" onkeydown=\"{{ onLoginKey }}\" style=\"margin-bottom:8px;\">\n      <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"\">\n        <div style=\"font-size:13px;color:var(--tcc-danger);margin-bottom:8px;\">{{ loginError }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button onclick=\"{{ doLogin }}\" style=\"width:100%;font-family:var(--font-sans);font-weight:600;font-size:var(--fs-body);color:var(--text-on-brand);background:var(--brand-primary);border:none;border-radius:var(--radius-sm);padding:13px;cursor:pointer;margin-top:12px;transition:all var(--dur-fast) var(--ease-standard);\" style-hover=\"filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 18px rgba(22,33,92,.28);\" style-active=\"transform:translateY(0);\">Sign in<\u002Fbutton>\n      <button onclick=\"{{ goHome }}\" style=\"display:block;margin:18px auto 0;font-size:14px;color:var(--text-secondary);background:none;border:none;cursor:pointer;transition:color var(--dur-fast) var(--ease-standard);\" style-hover=\"color:var(--text-primary);\">← Back to overview<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== ADMIN DASHBOARD ===== -->\n  <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n  <main style=\"position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:40px 32px 64px;animation:wbFade var(--dur-slow) var(--ease-out);\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px;\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent);font-weight:600;margin-bottom:10px;\">HR Console<\u002Fdiv>\n        <h1 style=\"font-family:var(--font-display);font-weight:300;font-size:34px;margin:0;color:var(--text-primary);\">Wellbeing request queue<\u002Fh1>\n      <\u002Fdiv>\n      <button onclick=\"{{ logout }}\" style=\"font-family:var(--font-sans);font-weight:600;font-size:var(--fs-body-sm);color:var(--text-brand);background:transparent;border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 18px;cursor:pointer;transition:all var(--dur-fast) var(--ease-standard);\" style-hover=\"background:var(--surface-sunken);\" style-active=\"transform:translateY(1px);\">Sign out<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;\">\n      <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px 20px;\"><div style=\"font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--text-primary);\">{{ aggTotal }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--text-secondary);\">Total requests<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px 20px;\"><div style=\"font-family:var(--font-mono);font-size:28px;font-weight:600;color:#c98a2e;\">{{ aggNew }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--text-secondary);\">Awaiting assignment<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px 20px;\"><div style=\"font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--text-accent);\">{{ aggScheduled }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--text-secondary);\">Scheduled<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px 20px;\"><div style=\"font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--tcc-danger);\">{{ aggFlag }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--text-secondary);\">Auto-flagged<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <sc-for list=\"{{ ticketRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n          <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-sm);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n                <span style=\"font-family:var(--font-mono);font-size:17px;font-weight:600;color:var(--text-primary);\">{{ row.id }}<\u002Fspan>\n                <span style=\"{{ row.moodBadgeStyle }}\">{{ row.moodLabel }}<\u002Fspan>\n                <sc-if value=\"{{ row.flag }}\" hint-placeholder-val=\"\">\n                  <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tcc-danger);background:#fbe4e5;border-radius:var(--radius-pill);padding:4px 11px;\">● Auto-flag<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;\">\n                <span style=\"{{ row.statusBadgeStyle }}\">{{ row.status }}<\u002Fspan>\n                <button onclick=\"{{ row.onDelete }}\" style=\"font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--tcc-danger);background:transparent;border:1px solid var(--tcc-danger);border-radius:var(--radius-pill);padding:5px 12px;cursor:pointer;opacity:.75;white-space:nowrap;transition:all var(--dur-fast) var(--ease-standard);\" style-hover=\"opacity:1;background:rgba(210,68,74,.06);\" style-active=\"transform:translateY(1px);\">Delete<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;\">\n              <sc-for list=\"{{ row.dimTags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                <span style=\"font-size:12px;font-weight:500;color:var(--text-brand);background:var(--surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:4px 12px;\">{{ tag }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ row.preferredDate }}\" hint-placeholder-val=\"\">\n              <div style=\"font-size:12.5px;color:var(--text-secondary);margin-bottom:10px;\">Booker's preferred: <strong style=\"color:var(--text-primary);font-family:var(--font-mono);\">{{ row.preferredDate }}<\u002Fstrong><\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;color:var(--text-secondary);\">\n              <span>Urgency: <strong style=\"color:var(--text-primary);font-weight:600;\">{{ row.urgencyLabel }}<\u002Fstrong><\u002Fspan>\n              <span>Format: <strong style=\"color:var(--text-primary);font-weight:600;\">{{ row.formatLabel }}<\u002Fstrong><\u002Fspan>\n              <span>Free: <strong style=\"color:var(--text-primary);font-weight:600;\">{{ row.timeText }}<\u002Fstrong><\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ row.note }}\" hint-placeholder-val=\"\">\n              <div style=\"background:var(--surface-sunken);border-left:2px solid var(--brand-accent);border-radius:var(--radius-xs);padding:12px 14px;font-size:14px;color:var(--text-primary);font-style:italic;line-height:1.5;margin-bottom:18px;\">“{{ row.note }}”<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:end;border-top:1px solid var(--border-subtle);padding-top:16px;\">\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;\">Wellbeing Officer<\u002Flabel>\n                <select class=\"wb-input\" value=\"{{ row.officer }}\" onchange=\"{{ row.onOfficer }}\">\n                  <option value=\"\">— Unassigned —<\u002Foption>\n                  <option value=\"P'Nan · Wellbeing Officer\">P'Nan · Wellbeing Officer<\u002Foption>\n                  <option value=\"P'Bruce · Business Dev\">P'Bruce · Business Dev<\u002Foption>\n                  <option value=\"P'Mai · People &amp; Culture\">P'Mai · People &amp; Culture<\u002Foption>\n                  <option value=\"Dr. Aim · Psychology\">Dr. Aim · Psychology<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;\">Proposed time<\u002Flabel>\n                <button onclick=\"{{ row.openCal }}\" style=\"{{ row.whenBtnStyle }}\" style-hover=\"border-color:var(--brand-accent);background:rgba(0,168,200,.08);\" style-active=\"transform:translateY(1px);\">{{ row.whenDisplay }}<\u002Fbutton>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;\">Status<\u002Flabel>\n                <select class=\"wb-input\" value=\"{{ row.status }}\" onchange=\"{{ row.onStatus }}\">\n                  <option value=\"New\">New<\u002Foption>\n                  <option value=\"Assigned\">Assigned<\u002Foption>\n                  <option value=\"Scheduled\">Scheduled<\u002Foption>\n                  <option value=\"Closed\">Closed<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;\">Outcome tag<\u002Flabel>\n                <select class=\"wb-input\" value=\"{{ row.outcome }}\" onchange=\"{{ row.onOutcome }}\">\n                  <option value=\"\">— Not yet assessed —<\u002Foption>\n                  <option value=\"PASS\">PASS · well-adjusted<\u002Foption>\n                  <option value=\"WATCH\">WATCH · monitor<\u002Foption>\n                  <option value=\"SUPPORT\">SUPPORT · at risk<\u002Foption>\n                  <option value=\"FLAG\">FLAG · escalate<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <aside style=\"display:flex;flex-direction:column;gap:16px;position:sticky;top:24px;\">\n        <div style=\"background:var(--surface-inverse);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:22px;color:#eef1f9;\">\n          <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--tcc-cyan-400);font-weight:600;margin-bottom:6px;\">Team Pulse × Wellbeing<\u002Fdiv>\n          <h3 style=\"font-family:var(--font-display);font-weight:300;font-size:21px;margin:0 0 6px;color:#fff;\">Aggregated signals<\u002Fh3>\n          <p style=\"font-size:12.5px;color:#9aa3c8;margin:0 0 18px;line-height:1.5;\">Demand by dimension across all requests. Identities are never shown — only patterns.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px;\">\n            <sc-for list=\"{{ dimBars }}\" as=\"bar\" hint-placeholder-count=\"5\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;\"><span style=\"color:#dfe3f4;\">{{ bar.label }}<\u002Fspan><span style=\"font-family:var(--font-mono);color:var(--tcc-cyan-400);\">{{ bar.count }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:7px;background:rgba(255,255,255,.08);border-radius:var(--radius-pill);overflow:hidden;\"><div style=\"height:100%;background:linear-gradient(90deg,var(--tcc-cyan-500),var(--tcc-cyan-300));border-radius:var(--radius-pill);width:{{ bar.pct }};\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid rgba(255,255,255,.1);margin-top:18px;padding-top:14px;font-size:12.5px;color:#9aa3c8;line-height:1.55;\">Team Pulse explains <strong style=\"color:#fff;\">behaviour<\u002Fstrong>. Wellbeing explains <strong style=\"color:#fff;\">motivation<\u002Fstrong>. Combined, they give HR the full picture.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px;\">\n          <div style=\"font-weight:600;color:var(--text-primary);font-size:14px;margin-bottom:8px;\">Officer guardrails<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:12.5px;color:var(--text-secondary);line-height:1.7;\">\n            <li>Confidential — no work scoring<\u002Fli>\n            <li>Independent, middle-ground support<\u002Fli>\n            <li>Not counselling or diagnosis<\u002Fli>\n            <li>Escalate flags to supervisor + HR same day<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  {{ calendarEl }}\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"position:relative;z-index:2;margin-top:auto;border-top:1px solid var(--border-subtle);padding:20px 32px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--text-secondary);\">\n    <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#1f8a5b;animation:wbPulse 2.6s var(--ease-standard) infinite;\"><\u002Fspan>Anonymous by design — no names, no tracking<\u002Fspan>\n    <span style=\"opacity:.45;\">·<\u002Fspan>\n    <span>Supports wellbeing &amp; early intervention; not clinical assessment or diagnosis<\u002Fspan>\n    <span style=\"opacity:.45;\">·<\u002Fspan>\n    <span>TCCtech Data Management — People &amp; Culture<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:860},&quot;loopSeconds&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:6,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:3,&quot;max&quot;:15}}\">\nclass Component extends DCLogic {\n  DIMS = [\n    { key: 'work', label: 'Work Experience', desc: 'Task clarity, workload, learning curve' },\n    { key: 'social', label: 'Social Integration', desc: 'Team dynamics, communication, belonging' },\n    { key: 'emotional', label: 'Emotional Health', desc: 'Stress levels, motivation, self-efficacy' },\n    { key: 'growth', label: 'Growth & Purpose', desc: 'Goals, mentorship, career vision' },\n    { key: 'env', label: 'Environmental Fit', desc: 'Office culture, space, logistics' },\n  ];\n  MOODS = [\n    { v: 1, label: 'Critical' }, { v: 2, label: 'Struggling' }, { v: 3, label: 'Neutral' },\n    { v: 4, label: 'Positive' }, { v: 5, label: 'Thriving' },\n  ];\n  URGENCY = [\n    { key: 'checkin', label: 'Just checking in', short: 'Check-in' },\n    { key: 'soon', label: 'Support soon', short: 'Soon' },\n    { key: 'week', label: 'Need to talk this week', short: 'This week' },\n  ];\n  FORMATS = [\n    { key: 'inperson', label: 'In person' },\n    { key: 'virtual', label: 'Virtual' },\n    { key: 'either', label: 'Either is fine' },\n  ];\n  TIMES = ['Mornings', 'Afternoons', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'];\n\n  state = {\n    view: 'home',\n    theme: 'light',\n    slide: 0,\n    dims: [],\n    mood: null,\n    urgency: null,\n    format: null,\n    times: [],\n    note: '',\n    ticketId: '',\n    loginUser: '',\n    loginPass: '',\n    loginError: '',\n    authed: false,\n    tickets: [],\n    pickerOpen: false,\n    pickerMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),\n    pickerDate: null,\n    pickerSlot: null,\n    pickerTarget: null,\n    bookDate: null,\n  };\n\n  componentDidMount() {\n    let theme = 'light', tickets = null;\n    try { theme = localStorage.getItem('wb_theme') || 'light'; } catch (e) {}\n    try { const raw = localStorage.getItem('wb_tickets'); if (raw) tickets = JSON.parse(raw); } catch (e) {}\n    if (!tickets || !tickets.length) tickets = this.seedTickets();\n    this.setState({ theme, tickets });\n    const secs = Math.max(2, Number(this.props.loopSeconds) || 6);\n    this._timer = setInterval(() => {\n      this.setState(s => (s.view === 'home' ? { slide: (s.slide + 1) % 5 } : {}));\n    }, secs * 1000);\n  }\n  componentWillUnmount() { if (this._timer) clearInterval(this._timer); }\n\n  seedTickets() {\n    return [\n      { id: 'WB-7T1A8', dims: ['emotional', 'work'], mood: 1, urgency: 'week', format: 'inperson', times: ['Mornings'], note: \"Haven't been sleeping well for a couple of weeks and feel stressed most days.\", status: 'Assigned', officer: \"P'Nan · Wellbeing Officer\", when: '', outcome: 'SUPPORT', flag: true },\n      { id: 'WB-4K9X2', dims: ['work', 'growth'], mood: 3, urgency: 'soon', format: 'virtual', times: ['Tue', 'Thu', 'Afternoons'], note: \"Not always sure what I should be working on day to day.\", status: 'New', officer: '', when: '', outcome: '', flag: false },\n      { id: 'WB-2M5P0', dims: ['social', 'env'], mood: 4, urgency: 'checkin', format: 'either', times: ['Wed', 'Fri', 'Mornings'], note: '', status: 'Scheduled', officer: \"P'Mai · People & Culture\", when: 'Wed 25 Jun, 11:00', outcome: 'WATCH', flag: false },\n    ];\n  }\n\n  persist(tickets) { try { localStorage.setItem('wb_tickets', JSON.stringify(tickets)); } catch (e) {} }\n\n  // ---------- navigation ----------\n  nav(view) { this.setState({ view, loginError: '' }); }\n  toggleTheme() {\n    this.setState(s => {\n      const theme = s.theme === 'light' ? 'dark' : 'light';\n      try { localStorage.setItem('wb_theme', theme); } catch (e) {}\n      return { theme };\n    });\n  }\n\n  // ---------- booking ----------\n  toggleDim(k) { this.setState(s => ({ dims: s.dims.includes(k) ? s.dims.filter(x => x !== k) : [...s.dims, k] })); }\n  toggleTime(t) { this.setState(s => ({ times: s.times.includes(t) ? s.times.filter(x => x !== t) : [...s.times, t] })); }\n  genId() { let r = ''; for (let i = 0; i < 5; i++) r += '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random() * 34)]; return 'WB-' + r; }\n  computeFlag(dims, mood, note) {\n    const n = (note || '').toLowerCase();\n    return mood === 1 || (dims.includes('emotional') && mood && mood <= 2) || /sleep|can.?t sleep|useless|invisible|unwanted|panic|burn ?out|burnt? out/.test(n);\n  }\n  submitBooking() {\n    const { dims, mood, urgency, format, times, note, tickets, bookDate } = this.state;\n    if (!dims.length && !mood) return;\n    const id = this.genId();\n    const t = { id, dims: [...dims], mood, urgency, format, times: [...times], note: note.trim(), preferredDate: bookDate || '', status: 'New', officer: '', when: '', outcome: '', flag: this.computeFlag(dims, mood, note) };\n    const next = [t, ...tickets];\n    this.persist(next);\n    this.setState({ tickets: next, ticketId: id, view: 'confirm', dims: [], mood: null, urgency
